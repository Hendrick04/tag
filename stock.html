<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif}

<body>

<h1>📦 Gestion du Stock</h1>

<div class="stats">
  <div class="stat"><div class="sv" id="s_total">0</div><div class="sl">Articles</div></div>
  <div class="stat"><div class="sv" id="s_valeur" style="font-size:16px">0</div><div class="sl">Valeur stock (FCFA)</div></div>
  <div class="stat"><div class="sv" id="s_alerte" style="color:#f59e0b">0</div><div class="sl">Stock faible</div></div>
  <div class="stat"><div class="sv" id="s_rupture" style="color:#ef4444">0</div><div class="sl">Ruptures</div></div>
</div>

<div class="card">
  <div style="font-size:14px;font-weight:600;margin-bottom:10px;color:#374151" id="fTitle">➕ Ajouter un article</div>
  <div class="fg">
    <div><label>Nom *</label><input id="f_nom" placeholder="Ex: Riz 5kg"/></div>
    <div><label>Catégorie</label>
      <select id="f_cat">
        <option>Alimentation</option><option>Boisson</option><option>Hygiène</option>
        <option>Électronique</option><option>Vêtements</option><option>Autre</option>
      </select>
    </div>
    <div><label>Quantité *</label><input id="f_qte" type="number" min="0" placeholder="0"/></div>
    <div><label>Seuil alerte</label><input id="f_seuil" type="number" min="0" placeholder="5"/></div>
    <div><label>Prix achat (FCFA)</label><input id="f_pa" type="number" min="0" placeholder="0"/></div>
    <div><label>Prix vente (FCFA)</label><input id="f_pv" type="number" min="0" placeholder="0"/></div>
    <div><label>Fournisseur</label><input id="f_four" placeholder="Nom fournisseur"/></div>
  </div>
  <div style="margin-top:10px;display:flex;gap:8px">
    <button class="btn bp" onclick="sauver()">Enregistrer</button>
    <button class="btn bg" onclick="reset()">Annuler</button>
  </div>
</div>

<div class="card">
  <div class="sbar">
    <input id="rech" placeholder="🔍 Rechercher..." oninput="render()"/>
    <select id="rcat" onchange="render()" style="flex:none;width:160px">
      <option value="">Toutes catégories</option>
      <option>Alimentation</option><option>Boisson</option><option>Hygiène</option>
      <option>Électronique</option><option>Vêtements</option><option>Autre</option>
    </select>
  </div>
  <div style="overflow-x:auto">
    <table>
      <thead><tr>
        <th>Article</th><th>Catégorie</th><th>Qté</th><th>P.Achat</th>
        <th>P.Vente</th><th>Marge</th><th>Fournisseur</th><th>État</th><th>Actions</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div id="empty" style="text-align:center;padding:28px;color:#9ca3af;font-size:13px;display:none">
      Aucun article — ajoutez votre premier article ci-dessus.
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  CONNEXION GOOGLE SHEETS — technique JSONP
//  Les fetch() sont bloqués par CORS sur Apps Script.
//  JSONP utilise <script src="..."> qui n'est jamais bloqué.
// ═══════════════════════════════════════════════════════════════════

const CONFIG = {
  API_URL: "https://script.google.com/macros/s/AKfycbwhyqFYZLT0wpPO7RO3XhFC6R2DJC69Izr2B9o2peAUy-_fhzYjhmk6ybuK8jU7wujIrQ/exec",
  DEBOUNCE_MS:   1500,
  RETRY_DELAYS:  [2000, 5000, 12000],
  POLL_INTERVAL: 60000,
  JSONP_TIMEOUT: 15000,
};

// ── JSONP : envoie une requête via <script>, reçoit callback ──────
let _cbCounter = 0;
function jsonp(params) {
  return new Promise((resolve, reject) => {
    const cbName = "_gscb" + (++_cbCounter);
    const timer  = setTimeout(() => {
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
      reject(new Error("Timeout Apps Script"));
    }, CONFIG.JSONP_TIMEOUT);

    window[cbName] = (data) => {
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
      if (data && data.ok === false) reject(new Error(data.error || "Erreur API"));
      else resolve(data);
    };

    params.callback = cbName;
    const qs     = Object.entries(params).map(([k,v]) => encodeURIComponent(k) + "=" + encodeURIComponent(v)).join("&");
    const script  = document.createElement("script");
    script.src    = CONFIG.API_URL + "?" + qs;
    script.onerror = () => {
      clearTimeout(timer);
      delete window[cbName];
      reject(new Error("Erreur chargement script JSONP"));
    };
    document.head.appendChild(script);
  });
}

// ── Lecture ───────────────────────────────────────────────────────
function apiGet(sheet) {
  return jsonp({ sheet: sheet, action: "getAll" }).then(r => r.data || []);
}

// ── Écriture (payload base64 pour rester dans les limites URL) ────
function apiWrite(payload) {
  const b64 = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
  return jsonp({ p: b64 });
}

// ═══════════════════════════════════════════════════════════════════
//  FILE D'ATTENTE — debounce + retry + offline
// ═══════════════════════════════════════════════════════════════════

const _queue = {
  pending: {},
  offline: [],

  schedule(sheet) {
    if (this.pending[sheet]) clearTimeout(this.pending[sheet]);
    this.pending[sheet] = setTimeout(() => this._flush(sheet), CONFIG.DEBOUNCE_MS);
    _ui.setSaving();
  },

  async _flush(sheet) {
    delete this.pending[sheet];
    const data = _buildPayload(sheet);
    await this._send(sheet, data, 0);
    if (!Object.keys(this.pending).length) _ui.setSynced();
  },

  async _send(sheet, data, attempt) {
    try {
      await apiWrite({ sheet: sheet, action: "syncAll", data: data });
      this.offline = this.offline.filter(o => o.sheet !== sheet);
    } catch (e) {
      const delay = CONFIG.RETRY_DELAYS[attempt];
      if (delay !== undefined) {
        _ui.setMsg("#f59e0b", "🔄 Retry dans " + Math.round(delay/1000) + "s…");
        setTimeout(() => this._send(sheet, data, attempt + 1), delay);
      } else {
        this.offline.push({ sheet: sheet, data: data });
        _ui.setMsg("#ef4444", "⚠️ Hors-ligne — sync au retour réseau", false);
      }
    }
  },

  async flushOffline() {
    const ops = this.offline.splice(0);
    for (const op of ops) await this._send(op.sheet, op.data, 0);
  },
};

// ═══════════════════════════════════════════════════════════════════
//  BARRE DE STATUT — discrète, en bas
// ═══════════════════════════════════════════════════════════════════

const _ui = {
  _el: null, _t: null,

  _bar() {
    if (!this._el) {
      this._el = Object.assign(document.createElement("div"), {});
      this._el.style.cssText = "position:fixed;bottom:0;left:0;right:0;padding:5px 14px;font-size:11px;font-family:system-ui,sans-serif;background:#1e293b;color:#cbd5e1;z-index:9999;opacity:0;transition:opacity .3s;display:flex;align-items:center;gap:7px;pointer-events:none";
      this._dot = Object.assign(document.createElement("span"), {});
      this._dot.style.cssText = "width:6px;height:6px;border-radius:50%;flex-shrink:0";
      this._txt = document.createElement("span");
      this._el.appendChild(this._dot);
      this._el.appendChild(this._txt);
      document.body.appendChild(this._el);
    }
    return this._el;
  },

  setMsg(color, text, autoHide) {
    if (autoHide === undefined) autoHide = true;
    const bar = this._bar();
    clearTimeout(this._t);
    this._dot.style.background = color;
    this._txt.textContent = text;
    bar.style.opacity = "1";
    if (autoHide) this._t = setTimeout(() => { bar.style.opacity = "0"; }, 3500);
  },

  setSaving() { this.setMsg("#f59e0b", "⏳ Sauvegarde…",                                              false); },
  setSynced() { this.setMsg("#22c55e", "✅ Sauvegardé — " + new Date().toLocaleTimeString("fr-FR"),   true);  },
  setLoading(){ this.setMsg("#3b82f6", "⏳ Chargement depuis Google Sheets…",                         false); },
  setLoaded() { this.setMsg("#22c55e", "✅ Synchronisé — " + new Date().toLocaleTimeString("fr-FR"),  true);  },
};

// ═══════════════════════════════════════════════════════════════════
//  CONSTRUCTION DES DONNÉES PAR FEUILLE
// ═══════════════════════════════════════════════════════════════════

function _buildPayload(sheet) {
  if (sheet === "stock") return DB.stock;

  if (sheet === "ventes") {
    var rows = [];
    DB.ventes.forEach(function(v) {
      (v.articles || []).forEach(function(a) {
        var st = DB.stock.find(function(s){ return s.id == a.articleId; });
        rows.push({
          id: v.id, date: v.date,
          articleId: a.articleId || "", nomArticle: a.nom,
          categorie: st ? st.categorie : "",
          client: v.client, quantite: a.quantite,
          prixUnitaire: a.prix, sousTotal: a.prix * a.quantite,
          remise: v.remise || 0, total: v.total,
          modePaiement: v.paiement || "espece",
        });
      });
    });
    return rows;
  }

  if (sheet === "points") {
    return Object.entries(DB.points).map(function(entry) {
      var date = entry[0], p = entry[1];
      var vj  = DB.ventes.filter(function(v){ return v.date === date; });
      var ca  = vj.reduce(function(s,v){ return s+(v.total||0); }, 0);
      var dep = (p.depenses||[]).reduce(function(s,d){ return s+(d.montant||0); }, 0);
      return {
        date: date, fondCaisse: p.fond||0, ca: ca, depenses: dep,
        margeBrute: 0, resultatNet: ca-dep,
        soldeCaisse: (p.fond||0)+ca-dep,
        nbVentes: vj.length, notes: p.notes||"",
      };
    });
  }

  if (sheet === "depenses") return DB.depenses;
  if (sheet === "retours")  return DB.retours;
  return [];
}

// ═══════════════════════════════════════════════════════════════════
//  DB LOCALE (localStorage)
// ═══════════════════════════════════════════════════════════════════

var DB_KEY = "gestion_boutique_v3";
var DB = { stock: [], ventes: [], points: {}, depenses: [], retours: [] };

function dbLoad() {
  try {
    var raw = localStorage.getItem(DB_KEY);
    DB = (raw ? JSON.parse(raw) : null) || { stock: [], ventes: [], points: {}, depenses: [], retours: [] };
  } catch(e) {
    DB = { stock: [], ventes: [], points: {}, depenses: [], retours: [] };
  }
}

function dbSave() {
  localStorage.setItem(DB_KEY, JSON.stringify(DB));
}

function autoSave(sheet) {
  dbSave();
  _queue.schedule(sheet);
}

function autoSaveMulti() {
  dbSave();
  for (var i = 0; i < arguments.length; i++) _queue.schedule(arguments[i]);
}

// ═══════════════════════════════════════════════════════════════════
//  CHARGEMENT INITIAL DEPUIS SHEETS
// ═══════════════════════════════════════════════════════════════════

function loadFromSheets(list) {
  list = list || ["stock","ventes","points","depenses","retours"];
  _ui.setLoading();

  var promise = Promise.resolve();
  list.forEach(function(sh) {
    promise = promise.then(function() {
      return apiGet(sh).then(function(rows) {
        _applyRows(sh, rows);
      }).catch(function(e) {
        // silencieux — on garde les données locales
      });
    });
  });

  return promise.then(function() {
    // Réinjecter dépenses dans points
    DB.depenses.forEach(function(d) {
      if (d.date && DB.points[d.date]) {
        if (!DB.points[d.date].depenses) DB.points[d.date].depenses = [];
        if (!DB.points[d.date].depenses.find(function(x){ return x.id == d.id; }))
          DB.points[d.date].depenses.push(d);
      }
    });
    dbSave();
    _ui.setLoaded();
  });
}

function _applyRows(sh, rows) {
  if (sh === "points") {
    DB.points = {};
    rows.forEach(function(r) {
      if (!r.date) return;
      DB.points[r.date] = { fond: parseFloat(r.fondCaisse)||0, depenses: [], notes: r.notes||"" };
    });

  } else if (sh === "ventes") {
    var vm = {};
    rows.forEach(function(r) {
      var id = r.id; if (!id) return;
      if (!vm[id]) vm[id] = {
        id: id, date: r.date||"",
        client: r.client||"Anonyme",
        paiement: r.modePaiement||"espece",
        remise: parseFloat(r.remise)||0,
        total: parseFloat(r.total)||0,
        articles: [],
      };
      if (r.articleId) vm[id].articles.push({
        articleId: r.articleId, nom: r.nomArticle||"",
        quantite: parseFloat(r.quantite)||1,
        prix: parseFloat(r.prixUnitaire)||0,
        total: parseFloat(r.sousTotal)||0,
      });
    });
    DB.ventes = Object.values(vm);

  } else {
    DB[sh] = rows.map(function(r) {
      var o = Object.assign({}, r);
      if (sh === "stock") {
        o.quantite  = parseFloat(r.quantite)  || 0;
        o.seuil     = parseFloat(r.seuil)     || 5;
        o.prixAchat = parseFloat(r.prixAchat) || 0;
        o.prixVente = parseFloat(r.prixVente) || 0;
      }
      if (sh === "depenses") o.montant  = parseFloat(r.montant)  || 0;
      if (sh === "retours")  { o.montant = parseFloat(r.montant)||0; o.quantite = parseFloat(r.quantite)||1; }
      return o;
    });
  }
}

// ─── Polling auto ────────────────────────────────────────────────
function startPolling(list) {
  setInterval(function() {
    if (Object.keys(_queue.pending).length) return;
    loadFromSheets(list).then(function() {
      document.dispatchEvent(new CustomEvent("sheetsUpdated"));
    }).catch(function(){});
  }, CONFIG.POLL_INTERVAL);
}

// ─── Retour réseau ───────────────────────────────────────────────
window.addEventListener("online", function() {
  _queue.flushOffline();
  loadFromSheets().catch(function(){});
});


// ─── Utilitaires ────────────────────────────────────────────────
function isApiConfigured() {
  return CONFIG.API_URL && CONFIG.API_URL !== "VOTRE_URL_APPS_SCRIPT_ICI";
}

</script>
<script>
let editId = null;

function stats() {
  let val = 0, al = 0, ru = 0;
  DB.stock.forEach(a => {
    val += (a.prixAchat || 0) * (a.quantite || 0);
    if ((a.quantite || 0) <= 0) ru++;
    else if ((a.quantite || 0) <= (a.seuil || 5)) al++;
  });
  document.getElementById("s_total").textContent   = DB.stock.length;
  document.getElementById("s_valeur").textContent  = val.toLocaleString("fr-FR");
  document.getElementById("s_alerte").textContent  = al;
  document.getElementById("s_rupture").textContent = ru;
}

function filtered() {
  const q   = document.getElementById("rech").value.toLowerCase();
  const cat = document.getElementById("rcat").value;
  return DB.stock.filter(a =>
    (!q   || a.nom.toLowerCase().includes(q) || (a.fournisseur||"").toLowerCase().includes(q)) &&
    (!cat || a.categorie === cat)
  );
}

function render() {
  const list = filtered();
  const tb   = document.getElementById("tbody");
  document.getElementById("empty").style.display = DB.stock.length ? "none" : "block";
  tb.innerHTML = list.map(a => {
    const pa = a.prixAchat || 0, pv = a.prixVente || 0, q = a.quantite || 0;
    const m  = pv - pa;
    const mp = pa > 0 ? Math.round(m / pa * 100) : 0;
    let bc = "bok", et = "OK";
    if (q <= 0) { bc = "bout"; et = "Rupture"; }
    else if (q <= (a.seuil || 5)) { bc = "blw"; et = "Faible"; }
    return `<tr>
      <td><strong>${a.nom}</strong><br><span style="color:#9ca3af;font-size:10px">${a.dateAjout||""}</span></td>
      <td>${a.categorie}</td>
      <td><strong>${q}</strong></td>
      <td>${pa.toLocaleString("fr-FR")}</td>
      <td>${pv.toLocaleString("fr-FR")}</td>
      <td style="color:${m>=0?"#059669":"#ef4444"}">${m.toLocaleString("fr-FR")} <small>(${mp}%)</small></td>
      <td>${a.fournisseur||"-"}</td>
      <td><span class="bk ${bc}">${et}</span></td>
      <td style="display:flex;gap:4px">
        <button class="btn be" onclick='editA(${JSON.stringify(a.id)})'>✏️</button>
        <button class="btn bx" onclick='delA(${JSON.stringify(a.id)})'>🗑️</button>
      </td>
    </tr>`;
  }).join("");
  stats();
}

function sauver() {
  const nom = document.getElementById("f_nom").value.trim();
  if (!nom) { alert("Le nom est obligatoire"); return; }
  const art = {
    id:          editId || Date.now(),
    nom,
    categorie:   document.getElementById("f_cat").value,
    quantite:    parseInt(document.getElementById("f_qte").value)   || 0,
    seuil:       parseInt(document.getElementById("f_seuil").value) || 5,
    prixAchat:   parseFloat(document.getElementById("f_pa").value)  || 0,
    prixVente:   parseFloat(document.getElementById("f_pv").value)  || 0,
    fournisseur: document.getElementById("f_four").value.trim(),
    dateAjout:   editId
      ? (DB.stock.find(a => a.id === editId) || {}).dateAjout || ""
      : new Date().toISOString().split("T")[0],
  };
  if (editId) {
    const i = DB.stock.findIndex(a => a.id === editId);
    if (i >= 0) DB.stock[i] = art; else DB.stock.push(art);
  } else {
    DB.stock.push(art);
  }
  autoSave("stock"); // ← sauvegarde automatique
  reset();
  render();
}

function editA(id) {
  const a = DB.stock.find(x => x.id === id); if (!a) return;
  editId = id;
  document.getElementById("f_nom").value   = a.nom;
  document.getElementById("f_cat").value   = a.categorie;
  document.getElementById("f_qte").value   = a.quantite;
  document.getElementById("f_seuil").value = a.seuil;
  document.getElementById("f_pa").value    = a.prixAchat;
  document.getElementById("f_pv").value    = a.prixVente;
  document.getElementById("f_four").value  = a.fournisseur || "";
  document.getElementById("fTitle").textContent = "✏️ Modifier l'article";
  window.scrollTo(0, 0);
}

function delA(id) {
  if (!confirm("Supprimer cet article ?")) return;
  DB.stock = DB.stock.filter(a => a.id !== id);
  autoSave("stock"); // ← sauvegarde automatique
  render();
}

function reset() {
  editId = null;
  ["f_nom","f_qte","f_seuil","f_pa","f_pv","f_four"].forEach(id =>
    document.getElementById(id).value = ""
  );
  document.getElementById("f_cat").value   = "Alimentation";
  document.getElementById("fTitle").textContent = "➕ Ajouter un article";
}

// Rafraîchir l'affichage quand les Sheets ont été mis à jour (polling)
document.addEventListener("sheetsUpdated", render);

// Démarrage
dbLoad();
render();
loadFromSheets(["stock"]).then(render);
startPolling(["stock"]);
</script>
</body>
</html>
