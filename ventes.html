<script>
// ═══════════════════════════════════════════════════════════════════
//  CONNEXION GOOGLE SHEETS — technique JSONP
//  Les fetch() sont bloqués par CORS sur Apps Script.
//  JSONP utilise <script src="..."> qui n'est jamais bloqué.
// ═══════════════════════════════════════════════════════════════════

const CONFIG = {
  API_URL: "https://script.google.com/macros/s/AKfycbwhyqFYZLT0wpPO7RO3XhFC6R2DJC69Izr2B9o2peAUy-_fhzYjhmk6ybuK8jU7wujIrQ/exec",
  DEBOUNCE_MS:   1500,
  RETRY_DELAYS:  [2000, 5000, 12000],
  POLL_INTERVAL: 60000,
  JSONP_TIMEOUT: 15000,
};

// ── JSONP : envoie une requête via <script>, reçoit callback ──────
let _cbCounter = 0;
function jsonp(params) {
  return new Promise((resolve, reject) => {
    const cbName = "_gscb" + (++_cbCounter);
    const timer  = setTimeout(() => {
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
      reject(new Error("Timeout Apps Script"));
    }, CONFIG.JSONP_TIMEOUT);

    window[cbName] = (data) => {
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
      if (data && data.ok === false) reject(new Error(data.error || "Erreur API"));
      else resolve(data);
    };

    params.callback = cbName;
    const qs     = Object.entries(params).map(([k,v]) => encodeURIComponent(k) + "=" + encodeURIComponent(v)).join("&");
    const script  = document.createElement("script");
    script.src    = CONFIG.API_URL + "?" + qs;
    script.onerror = () => {
      clearTimeout(timer);
      delete window[cbName];
      reject(new Error("Erreur chargement script JSONP"));
    };
    document.head.appendChild(script);
  });
}

// ── Lecture ───────────────────────────────────────────────────────
function apiGet(sheet) {
  return jsonp({ sheet: sheet, action: "getAll" }).then(r => r.data || []);
}

// ── Écriture (payload base64 pour rester dans les limites URL) ────
function apiWrite(payload) {
  const b64 = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
  return jsonp({ p: b64 });
}

// ═══════════════════════════════════════════════════════════════════
//  FILE D'ATTENTE — debounce + retry + offline
// ═══════════════════════════════════════════════════════════════════

const _queue = {
  pending: {},
  offline: [],

  schedule(sheet) {
    if (this.pending[sheet]) clearTimeout(this.pending[sheet]);
    this.pending[sheet] = setTimeout(() => this._flush(sheet), CONFIG.DEBOUNCE_MS);
    _ui.setSaving();
  },

  async _flush(sheet) {
    delete this.pending[sheet];
    const data = _buildPayload(sheet);
    await this._send(sheet, data, 0);
    if (!Object.keys(this.pending).length) _ui.setSynced();
  },

  async _send(sheet, data, attempt) {
    try {
      await apiWrite({ sheet: sheet, action: "syncAll", data: data });
      this.offline = this.offline.filter(o => o.sheet !== sheet);
    } catch (e) {
      const delay = CONFIG.RETRY_DELAYS[attempt];
      if (delay !== undefined) {
        _ui.setMsg("#f59e0b", "🔄 Retry dans " + Math.round(delay/1000) + "s…");
        setTimeout(() => this._send(sheet, data, attempt + 1), delay);
      } else {
        this.offline.push({ sheet: sheet, data: data });
        _ui.setMsg("#ef4444", "⚠️ Hors-ligne — sync au retour réseau", false);
      }
    }
  },

  async flushOffline() {
    const ops = this.offline.splice(0);
    for (const op of ops) await this._send(op.sheet, op.data, 0);
  },
};

// ═══════════════════════════════════════════════════════════════════
//  BARRE DE STATUT — discrète, en bas
// ═══════════════════════════════════════════════════════════════════

const _ui = {
  _el: null, _t: null,

  _bar() {
    if (!this._el) {
      this._el = Object.assign(document.createElement("div"), {});
      this._el.style.cssText = "position:fixed;bottom:0;left:0;right:0;padding:5px 14px;font-size:11px;font-family:system-ui,sans-serif;background:#1e293b;color:#cbd5e1;z-index:9999;opacity:0;transition:opacity .3s;display:flex;align-items:center;gap:7px;pointer-events:none";
      this._dot = Object.assign(document.createElement("span"), {});
      this._dot.style.cssText = "width:6px;height:6px;border-radius:50%;flex-shrink:0";
      this._txt = document.createElement("span");
      this._el.appendChild(this._dot);
      this._el.appendChild(this._txt);
      document.body.appendChild(this._el);
    }
    return this._el;
  },

  setMsg(color, text, autoHide) {
    if (autoHide === undefined) autoHide = true;
    const bar = this._bar();
    clearTimeout(this._t);
    this._dot.style.background = color;
    this._txt.textContent = text;
    bar.style.opacity = "1";
    if (autoHide) this._t = setTimeout(() => { bar.style.opacity = "0"; }, 3500);
  },

  setSaving() { this.setMsg("#f59e0b", "⏳ Sauvegarde…",                                              false); },
  setSynced() { this.setMsg("#22c55e", "✅ Sauvegardé — " + new Date().toLocaleTimeString("fr-FR"),   true);  },
  setLoading(){ this.setMsg("#3b82f6", "⏳ Chargement depuis Google Sheets…",                         false); },
  setLoaded() { this.setMsg("#22c55e", "✅ Synchronisé — " + new Date().toLocaleTimeString("fr-FR"),  true);  },
};

// ═══════════════════════════════════════════════════════════════════
//  CONSTRUCTION DES DONNÉES PAR FEUILLE
// ═══════════════════════════════════════════════════════════════════

function _buildPayload(sheet) {
  if (sheet === "stock") return DB.stock;

  if (sheet === "ventes") {
    var rows = [];
    DB.ventes.forEach(function(v) {
      (v.articles || []).forEach(function(a) {
        var st = DB.stock.find(function(s){ return s.id == a.articleId; });
        rows.push({
          id: v.id, date: v.date,
          articleId: a.articleId || "", nomArticle: a.nom,
          categorie: st ? st.categorie : "",
          client: v.client, quantite: a.quantite,
          prixUnitaire: a.prix, sousTotal: a.prix * a.quantite,
          remise: v.remise || 0, total: v.total,
          modePaiement: v.paiement || "espece",
        });
      });
    });
    return rows;
  }

  if (sheet === "points") {
    return Object.entries(DB.points).map(function(entry) {
      var date = entry[0], p = entry[1];
      var vj  = DB.ventes.filter(function(v){ return v.date === date; });
      var ca  = vj.reduce(function(s,v){ return s+(v.total||0); }, 0);
      var dep = (p.depenses||[]).reduce(function(s,d){ return s+(d.montant||0); }, 0);
      return {
        date: date, fondCaisse: p.fond||0, ca: ca, depenses: dep,
        margeBrute: 0, resultatNet: ca-dep,
        soldeCaisse: (p.fond||0)+ca-dep,
        nbVentes: vj.length, notes: p.notes||"",
      };
    });
  }

  if (sheet === "depenses") return DB.depenses;
  if (sheet === "retours")  return DB.retours;
  return [];
}

// ═══════════════════════════════════════════════════════════════════
//  DB LOCALE (localStorage)
// ═══════════════════════════════════════════════════════════════════

var DB_KEY = "gestion_boutique_v3";
var DB = { stock: [], ventes: [], points: {}, depenses: [], retours: [] };

function dbLoad() {
  try {
    var raw = localStorage.getItem(DB_KEY);
    DB = (raw ? JSON.parse(raw) : null) || { stock: [], ventes: [], points: {}, depenses: [], retours: [] };
  } catch(e) {
    DB = { stock: [], ventes: [], points: {}, depenses: [], retours: [] };
  }
}

function dbSave() {
  localStorage.setItem(DB_KEY, JSON.stringify(DB));
}

function autoSave(sheet) {
  dbSave();
  _queue.schedule(sheet);
}

function autoSaveMulti() {
  dbSave();
  for (var i = 0; i < arguments.length; i++) _queue.schedule(arguments[i]);
}

// ═══════════════════════════════════════════════════════════════════
//  CHARGEMENT INITIAL DEPUIS SHEETS
// ═══════════════════════════════════════════════════════════════════

function loadFromSheets(list) {
  list = list || ["stock","ventes","points","depenses","retours"];
  _ui.setLoading();

  var promise = Promise.resolve();
  list.forEach(function(sh) {
    promise = promise.then(function() {
      return apiGet(sh).then(function(rows) {
        _applyRows(sh, rows);
      }).catch(function(e) {
        // silencieux — on garde les données locales
      });
    });
  });

  return promise.then(function() {
    // Réinjecter dépenses dans points
    DB.depenses.forEach(function(d) {
      if (d.date && DB.points[d.date]) {
        if (!DB.points[d.date].depenses) DB.points[d.date].depenses = [];
        if (!DB.points[d.date].depenses.find(function(x){ return x.id == d.id; }))
          DB.points[d.date].depenses.push(d);
      }
    });
    dbSave();
    _ui.setLoaded();
  });
}

function _applyRows(sh, rows) {
  if (sh === "points") {
    DB.points = {};
    rows.forEach(function(r) {
      if (!r.date) return;
      DB.points[r.date] = { fond: parseFloat(r.fondCaisse)||0, depenses: [], notes: r.notes||"" };
    });

  } else if (sh === "ventes") {
    var vm = {};
    rows.forEach(function(r) {
      var id = r.id; if (!id) return;
      if (!vm[id]) vm[id] = {
        id: id, date: r.date||"",
        client: r.client||"Anonyme",
        paiement: r.modePaiement||"espece",
        remise: parseFloat(r.remise)||0,
        total: parseFloat(r.total)||0,
        articles: [],
      };
      if (r.articleId) vm[id].articles.push({
        articleId: r.articleId, nom: r.nomArticle||"",
        quantite: parseFloat(r.quantite)||1,
        prix: parseFloat(r.prixUnitaire)||0,
        total: parseFloat(r.sousTotal)||0,
      });
    });
    DB.ventes = Object.values(vm);

  } else {
    DB[sh] = rows.map(function(r) {
      var o = Object.assign({}, r);
      if (sh === "stock") {
        o.quantite  = parseFloat(r.quantite)  || 0;
        o.seuil     = parseFloat(r.seuil)     || 5;
        o.prixAchat = parseFloat(r.prixAchat) || 0;
        o.prixVente = parseFloat(r.prixVente) || 0;
      }
      if (sh === "depenses") o.montant  = parseFloat(r.montant)  || 0;
      if (sh === "retours")  { o.montant = parseFloat(r.montant)||0; o.quantite = parseFloat(r.quantite)||1; }
      return o;
    });
  }
}

// ─── Polling auto ────────────────────────────────────────────────
function startPolling(list) {
  setInterval(function() {
    if (Object.keys(_queue.pending).length) return;
    loadFromSheets(list).then(function() {
      document.dispatchEvent(new CustomEvent("sheetsUpdated"));
    }).catch(function(){});
  }, CONFIG.POLL_INTERVAL);
}

// ─── Retour réseau ───────────────────────────────────────────────
window.addEventListener("online", function() {
  _queue.flushOffline();
  loadFromSheets().catch(function(){});
});


// ─── Utilitaires ────────────────────────────────────────────────
function isApiConfigured() {
  return CONFIG.API_URL && CONFIG.API_URL !== "VOTRE_URL_APPS_SCRIPT_ICI";
}

</script>
<script>
let panier = [];

function peuplerArt() {
  const sel = document.getElementById("art");
  sel.innerHTML = '<option value="">-- Choisir un article --</option>';
  DB.stock.forEach(a => {
    const o = document.createElement("option");
    o.value = a.id;
    o.textContent = `${a.nom} (Stock: ${a.quantite || 0})`;
    o.dataset.prix  = a.prixVente  || 0;
    o.dataset.stock = a.quantite   || 0;
    sel.appendChild(o);
  });
}

function majPrix() {
  const opt = document.getElementById("art").selectedOptions[0];
  if (opt?.dataset.prix) { document.getElementById("pu").value = opt.dataset.prix; calcL(); }
}

function calcL() {
  const p = parseFloat(document.getElementById("pu").value) || 0;
  const q = parseInt(document.getElementById("qte").value)  || 0;
  document.getElementById("tl").value = (p * q).toFixed(0);
}

function ajPanier() {
  const sel = document.getElementById("art");
  const opt = sel.selectedOptions[0];
  if (!opt?.value) { alert("Sélectionnez un article"); return; }
  const q   = parseInt(document.getElementById("qte").value)  || 0;
  const p   = parseFloat(document.getElementById("pu").value) || 0;
  const stk = parseInt(opt.dataset.stock) || 0;
  if (q <= 0)   { alert("Quantité invalide"); return; }
  if (q > stk)  { alert(`Stock insuffisant ! Disponible : ${stk}`); return; }
  const ex = panier.find(x => x.articleId == opt.value);
  if (ex) { ex.quantite += q; ex.total = ex.prix * ex.quantite; }
  else panier.push({ articleId: opt.value, nom: opt.textContent.split("(")[0].trim(), quantite: q, prix: p, total: p * q });
  renderP();
}

function renderP() {
  const z = document.getElementById("panierZone");
  const l = document.getElementById("panierListe");
  if (!panier.length) { z.style.display = "none"; return; }
  z.style.display = "block";
  l.innerHTML = panier.map((p, i) => `
    <div class="pi">
      <span>${p.nom}</span>
      <span style="display:flex;align-items:center;gap:8px">
        <input type="number" value="${p.quantite}" min="1"
          style="width:55px;padding:3px;border-radius:6px;border:1px solid #bfdbfe"
          onchange="majQ(${i},this.value)">
        × ${p.prix.toLocaleString("fr-FR")} = <strong>${p.total.toLocaleString("fr-FR")}</strong>
        <button style="background:#fee2e2;color:#ef4444;border:none;border-radius:5px;padding:2px 6px;cursor:pointer"
          onclick="retirer(${i})">✕</button>
      </span>
    </div>`).join("");
  majTot();
}

function majQ(i, v) { panier[i].quantite = parseInt(v)||1; panier[i].total = panier[i].prix * panier[i].quantite; renderP(); }
function retirer(i) { panier.splice(i, 1); renderP(); }
function majTot() {
  const s = panier.reduce((t, p) => t + p.total, 0);
  const r = parseFloat(document.getElementById("remise").value) || 0;
  document.getElementById("totalP").textContent = (s - r).toLocaleString("fr-FR") + " FCFA";
}
function vider() { if (confirm("Vider le panier ?")) { panier = []; renderP(); } }

function valider() {
  if (!panier.length) { alert("Panier vide"); return; }
  const sous   = panier.reduce((s, p) => s + p.total, 0);
  const remise = parseFloat(document.getElementById("remise").value) || 0;
  const v = {
    id:       Date.now(),
    date:     document.getElementById("dateV").value || new Date().toISOString().split("T")[0],
    client:   document.getElementById("client").value.trim() || "Anonyme",
    paiement: document.getElementById("paie").value,
    articles: [...panier],
    remise,
    total:    sous - remise,
  };
  DB.ventes.unshift(v);
  // Décrémenter le stock
  panier.forEach(p => {
    const a = DB.stock.find(s => s.id == p.articleId);
    if (a) a.quantite = Math.max(0, (a.quantite || 0) - p.quantite);
  });
  // ← Sauvegarde automatique des deux feuilles concernées
  autoSaveMulti("ventes", "stock");
  panier = [];
  renderP();
  document.getElementById("client").value = "";
  document.getElementById("remise").value = 0;
  renderH();
  majStats();
  peuplerArt();
}

function renderH() {
  const d = document.getElementById("fd").value;
  const c = document.getElementById("fc").value.toLowerCase();
  const p = document.getElementById("fp").value;
  const list = DB.ventes.filter(v =>
    (!d || v.date === d) && (!c || v.client.toLowerCase().includes(c)) && (!p || v.paiement === p)
  );
  const tb = document.getElementById("hTb");
  document.getElementById("hEm").style.display = list.length ? "none" : "block";
  const lp = { espece:"Espèces", mobile:"Mobile Money", credit:"Crédit", carte:"Carte" };
  const lc = { espece:"pe", mobile:"pm", credit:"pc", carte:"pm" };
  tb.innerHTML = list.map(v => `<tr>
    <td>${v.date}</td>
    <td style="max-width:180px">${(v.articles||[]).map(a=>`${a.nom}×${a.quantite}`).join(", ")}</td>
    <td>${v.client}</td>
    <td><span class="bk ${lc[v.paiement]||"pe"}">${lp[v.paiement]||v.paiement}</span></td>
    <td><strong>${(v.total||0).toLocaleString("fr-FR")}</strong></td>
    <td><button class="btn br bsm" onclick="delV(${v.id})">🗑️</button></td>
  </tr>`).join("");
}

function delV(id) {
  if (!confirm("Supprimer cette vente ?")) return;
  DB.ventes = DB.ventes.filter(v => v.id !== id);
  autoSave("ventes"); // ← sauvegarde automatique
  renderH();
  majStats();
}

function majStats() {
  const today = new Date().toISOString().split("T")[0];
  const mois  = today.slice(0, 7);
  const vj = DB.ventes.filter(v => v.date === today);
  const vm = DB.ventes.filter(v => v.date.startsWith(mois));
  document.getElementById("s_vj").textContent  = vj.length;
  document.getElementById("s_caj").textContent = vj.reduce((s,v)=>s+(v.total||0),0).toLocaleString("fr-FR");
  document.getElementById("s_vm").textContent  = vm.length;
  document.getElementById("s_cam").textContent = vm.reduce((s,v)=>s+(v.total||0),0).toLocaleString("fr-FR");
}

document.addEventListener("sheetsUpdated", () => { peuplerArt(); renderH(); majStats(); });

// Démarrage
dbLoad();
document.getElementById("dateV").value = new Date().toISOString().split("T")[0];
document.getElementById("fd").value    = new Date().toISOString().split("T")[0];
peuplerArt(); renderH(); majStats();
loadFromSheets(["stock","ventes"]).then(() => { peuplerArt(); renderH(); majStats(); });
startPolling(["stock","ventes"]);
</script>
</body>
</html>
